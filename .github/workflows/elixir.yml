name: Elixir CI

on:
  push:
  pull_request:
  schedule:
    - cron: "0 5 * * *"

concurrency:
  group: elixir-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUILD_WITHOUT_QUIC: 1

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-22.04

    services:
      mosquitto:
        image: eclipse-mosquitto@sha256:914f529386804c8278a4e581526b9be5e1604df44b30daabc70aa97dcefe5268 # 2.0
        ports:
          - 1883:1883
        volumes:
          - ./mosquitto:/mosquitto/config/
        options: --name mqtt

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Restart MQTT to load mosquitto/mosquitto.conf from checkout
        run: docker restart mqtt
      # cache the ASDF directory, using the values from .tool-versions
      - name: ASDF cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.asdf
          key: ${{ runner.os }}-asdf-v4-${{ hashFiles('.tool-versions') }}
        id: asdf-cache
      # only run `asdf install` if we didn't hit the cache
      - uses: asdf-vm/actions/install@b7bcd026f18772e44fe1026d729e1611cc435d47 # v4.0.1
        if: steps.asdf-cache.outputs.cache-hit != 'true'
      # if we did hit the cache, set up the environment
      - name: Setup and Reshim ASDF
        run: |
          echo "ASDF_DIR=$HOME/.asdf" >> $GITHUB_ENV
          echo "ASDF_DATA_DIR=$HOME/.asdf" >> $GITHUB_ENV
          echo "$HOME/.asdf/bin" >> $GITHUB_PATH
          echo "$HOME/.asdf/shims" >> $GITHUB_PATH
          $HOME/.asdf/bin/asdf reshim
        if: steps.asdf-cache.outputs.cache-hit == 'true'
      - name: Restore dependencies cache
        id: deps-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-
      - name: Install dependencies
        run: |
          mix local.rebar --foce
          mix local.hex --force
          mix deps.get
      - name: Compile (warnings as errors)
        run: mix compile --force --warnings-as-errors
      - name: Check formatting
        run: mix format --check-formatted
      - name: Credo
        run: mix credo --strict
      - name: Run tests
        run: mix test --cover
      - name: Save PR information
        run: |
          echo "$PR_NUMBER" > coverage/PR_NUMBER
          echo "$PR_SHA" > coverage/PR_SHA
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
        if: github.event.pull_request
      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: elixir-lcov
          path: coverage/
      - uses: mbta/actions/dialyzer@d37877022d4ae12e96663d2e0a970a5214a2e232 # v2.20

  zizmor:
    name: Run zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read # required for checkout

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: false
          persona: pedantic
